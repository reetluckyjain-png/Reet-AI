<!DOCTYPE html>
<html>
<head>
<title>Reet AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.msg { margin: 10px 0; }

.user { text-align: right; color: #38bdf8; }
.bot { text-align: left; color: #22c55e; }

#inputArea {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  margin-left: 5px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Reet AI 🤖</h2>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Type..." />
<button onclick="sendMessage()">Send</button>
<button onclick="startListening()">🎤</button>
</div>

<script>
const chat = document.getElementById("chat");

// chat UI
function add(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// delay (human thinking feel)
function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}

// ---------------- HUMAN VOICE ----------------
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);

  const voices = window.speechSynthesis.getVoices();

  speech.voice =
    voices.find(v =>
      v.name.includes("Google") ||
      v.name.includes("Natural") ||
      v.name.includes("Female")
    ) || voices[0];

  speech.rate = 1;   // slower = human
  speech.pitch = 1.08;   // slight emotion
  speech.volume = 1;

  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(speech);
}

// ---------------- SEND MESSAGE ----------------
async function sendMessage() {
  const input = document.getElementById("input");
  const msg = input.value;
  input.value = "";

  add("You: " + msg, "user");

  add("Reet is thinking...", "bot");
  await delay(700);

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: msg, key: "reet123" })
  });

  const data = await res.json();

  if (data.type === "chat") {
    add("Reet: " + data.reply, "bot");
    speak(data.reply);
  }

  if (data.type === "action") {
    add("Reet: opening something...", "bot");
    speak("Okay, opening it");

    if (data.action === "open_website") {
      window.open(data.payload.url, "_blank");
    }
  }
}

// ---------------- VOICE INPUT ----------------
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang = "en-US";

function startListening() {
  rec.start();
}

rec.onresult = (e) => {
  const text = e.results[0][0].transcript;
  document.getElementById("input").value = text;
  sendMessage();
};
</script>

</body>
</html>
