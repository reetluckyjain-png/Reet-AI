<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reet AI</title>
<style>
:root {
  --bg-1: #071126;
  --bg-2: #111827;
  --surface: #18263e;
  --surface-2: #233251;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #22c55e;
  --accent-2: #1d4ed8;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", Tahoma, sans-serif;
  color: var(--text);
  background: radial-gradient(circle at top right, #17355e, transparent 45%), linear-gradient(180deg, var(--bg-1), var(--bg-2));
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.2);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.title {
  font-size: 20px;
  font-weight: 700;
  margin-right: auto;
}

#authKey {
  width: 210px;
  max-width: 100%;
  border: 1px solid rgba(148, 163, 184, 0.35);
  background: #0f172a;
  color: var(--text);
  border-radius: 10px;
  padding: 9px 10px;
}

#saveKeyBtn {
  background: var(--accent);
  color: #02140a;
  border: none;
  border-radius: 10px;
  padding: 9px 12px;
  font-weight: 600;
  cursor: pointer;
}

#keyHint {
  color: var(--muted);
  font-size: 12px;
  width: 100%;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  max-width: min(760px, 82%);
  border-radius: 14px;
  padding: 11px 14px;
  line-height: 1.4;
  word-wrap: break-word;
  white-space: pre-wrap;
}

.user {
  align-self: flex-end;
  background: var(--accent-2);
}

.bot {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid rgba(148, 163, 184, 0.25);
}

.typing {
  display: flex;
  gap: 5px;
  align-items: center;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: var(--muted);
  animation: blink 1.2s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.25; }
  40% { opacity: 1; }
}

#inputArea {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-top: 1px solid rgba(148, 163, 184, 0.2);
  background: rgba(2, 6, 23, 0.6);
}

#input {
  flex: 1;
  border-radius: 12px;
  border: 1px solid rgba(148, 163, 184, 0.3);
  background: #0f172a;
  color: var(--text);
  padding: 12px;
  outline: none;
}

#sendBtn {
  border: none;
  border-radius: 12px;
  background: var(--accent-2);
  color: #fff;
  padding: 12px 16px;
  cursor: pointer;
}

@media (max-width: 700px) {
  .msg { max-width: 92%; }
}
</style>
</head>
<body>

<header>
  <div class="title">Reet AI</div>
  <input id="authKey" type="password" placeholder="API key (SECRET_KEY)" autocomplete="off" />
  <button id="saveKeyBtn" type="button">Save Key</button>
  <div id="keyHint">If server auth is enabled, set the same key as <code>SECRET_KEY</code>.</div>
</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Type a message..." />
  <button id="sendBtn" type="button">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const authKeyInput = document.getElementById("authKey");
const saveKeyBtn = document.getElementById("saveKeyBtn");
const sendBtn = document.getElementById("sendBtn");

const STORAGE_KEY = "reet_api_key";
const CLIENT_ID_KEY = "reet_client_id";

function loadApiKey() {
  return localStorage.getItem(STORAGE_KEY) || "";
}

function saveApiKey(key) {
  localStorage.setItem(STORAGE_KEY, key);
}

function getClientId() {
  let id = localStorage.getItem(CLIENT_ID_KEY);
  if (!id) {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
      id = window.crypto.randomUUID().replace(/-/g, "");
    } else {
      id = `${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
    }
    localStorage.setItem(CLIENT_ID_KEY, id);
  }
  return id;
}

function add(text, cls) {
  const node = document.createElement("div");
  node.className = `msg ${cls}`;
  node.innerText = text;
  chat.appendChild(node);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const node = document.createElement("div");
  node.className = "msg bot typing";
  node.id = "typing";
  node.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(node);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const node = document.getElementById("typing");
  if (node) node.remove();
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  add(message, "user");
  showTyping();

  const clientId = getClientId();
  const apiKey = loadApiKey();

  try {
    const headers = { "Content-Type": "application/json", "x-client-id": clientId };
    if (apiKey) headers["x-api-key"] = apiKey;

    const res = await fetch("/chat", {
      method: "POST",
      headers,
      body: JSON.stringify({ message, clientId })
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      add(data.error || "Request failed.", "bot");
      return;
    }

    if (data.type === "multi_action" && Array.isArray(data.actions)) {
      add("Executing multiple actions...", "bot");
      for (const act of data.actions) {
        if (act.action === "open_website") {
          window.open(act.payload.url, "_blank");
        }
        await new Promise((r) => setTimeout(r, 600));
      }
      return;
    }

    if (data.type === "action") {
      window.open(data.payload.url, "_blank");
      add("Opening...", "bot");
      return;
    }

    add(data.reply || "Something went wrong.", "bot");
  } catch {
    removeTyping();
    add("Server error.", "bot");
  }
}

authKeyInput.value = loadApiKey();

saveKeyBtn.addEventListener("click", () => {
  saveApiKey(authKeyInput.value.trim());
  add("API key saved locally.", "bot");
});

sendBtn.addEventListener("click", send);
input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") send();
});
</script>
</body>
</html>
